services:
  app:
    build: .
    container_name: jobengine
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/jobs.db
    volumes:
      # База данных живёт снаружи контейнера — не теряется при пересборке
      - ./data:/app/data
    restart: unless-stopped